<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Parking The Beasts</title>
    <link rel="stylesheet" href="styles/inicioSesion.css">
</head>
<body>
    <div class="container">
        <!-- Seccion del Logo -->
        <div class="logo-section">
            <img src="images/LogoInicio.png" alt="Parking The Beasts Logo">
        </div>

        <!-- Seccion de Login -->
        <div class="login-box">
            <div class="title-inicio">
                <h2>Iniciar sesion</h2>
            </div>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Correo" required>
                <p>
                <input type="password" id="password" placeholder="Contrasena" required>
                
                <a href="#" class="forgot-password">Olvidaste tu contrasena?</a>
                <p>
                <p>
        
                <button type="submit" class="submit" id="login">Ingresar</button>
            
                <p class="no-cuenta">Aun no tienes una cuenta? </p>
                <a href="registro.html" class="register-link">Registrarse</a>
            </form>
            <div id="errorMessage" class="error-message" style="display: none; color: red; margin-top: 10px;"></div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('login');
            
            // Disable button while processing
            submitBtn.disabled = true;
            submitBtn.textContent = 'Ingresando...';
            errorDiv.style.display = 'none';
            
            try {
                const result = await AuthAPI.login(email, password);
                
                if (result.success) {
                    // Store user session
                    storeUserSession(result.user);
                    
                    // Redirect based on role
                    if (result.user.role === 'ADMIN') {
                        window.location.href = 'views/verReservaAdm.html';
                    } else {
                        window.location.href = 'views/createReservation.html';
                    }
                } else {
                    errorDiv.textContent = result.message || 'Error al iniciar sesion';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = error.message || 'Error de conexion. Intente nuevamente.';
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ingresar';
            }
        });
    </script>
</body>
</html>
