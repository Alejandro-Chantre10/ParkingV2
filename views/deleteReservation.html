<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eliminar</title>
  <style>
    /* Fondo oscuro */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* Ventana modal */
    .modal-content {
      background: white;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    .modal-content img {
      width: 60px;
      margin-bottom: 15px;
    }

    .modal-content p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .modal-buttons {
      display: flex;
      justify-content: space-between;
    }

    .modal-buttons button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-confirm {
      background-color: #5f6caf;
      color: white;
    }

    .btn-cancel {
      background-color: #ccc;
    }
  </style>
</head>
<body>

  <!-- Botón para abrir el modal -->
  <button onclick="showPaymentModal()">Realizar Pago</button>

  <!-- Modal -->
  <div class="modal-overlay" id="paymentModal">
    <div class="modal-content">
      <img src="../images/advertencia-de-triangulo.png" alt="Advertencia">
      <p>¿Estás seguro de eliminar la reserva?</p>
      <div class="modal-buttons">
        <button class="btn-confirm" onclick="confirmPayment()">Confirmar</button>
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    function showPaymentModal() {
      document.getElementById('paymentModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('paymentModal').style.display = 'none';
    }

    function confirmPayment() {
      closeModal();
      alert("Reserva eliminada✅");
      // Aquí puedes añadir lógica de pago
    }
  </script>

</body>
</html>
