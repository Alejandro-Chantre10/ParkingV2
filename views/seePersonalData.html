<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Parking The Beasts</title>
    <link rel="stylesheet" href="../styles/personalData.css">
    <link rel="stylesheet" href="../styles/sideBar.css">
</head>

<body>
    <div id="menu-container"></div>
    <div class="main-content">
        <div class="profile-container">
            <div class="profile-image-wrapper">
                <img src="../images/ICONO USUARIO.png" alt="Imagen de perfil" class="profile-image">
            </div>
            <div class="profile-name" id="userName">Cargando...</div>

            <div class="form-container">
                <div class="form-group">
                    <label>Nombre completo</label>
                    <input id="fullName" type="text" placeholder="Nombre" readonly>
                </div>

                <div class="form-group">
                    <label>Correo electronico</label>
                    <input id="email" type="email" placeholder="Correo" readonly>
                </div>

                <div class="form-group">
                    <label>Telefono</label>
                    <input id="phone" type="text" placeholder="Telefono" readonly>
                </div>

                <div class="form-group">
                    <label>Rol</label>
                    <input id="role" type="text" placeholder="Rol" readonly>
                </div>

                <div class="form-group">
                    <label>Miembro desde</label>
                    <input id="createdAt" type="text" placeholder="Fecha registro" readonly>
                </div>

                <div class="profile-actions" style="display: flex; flex-direction: column; gap: 12px; margin-top: 25px; width: 100%;">
                    <div style="display: flex; gap: 12px; width: 100%;">
                        <a href="updatePersonalData.html" class="btn-save" type="button" style="flex: 1; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center;">Editar perfil</a>
                        <a href="updatePassword.html" class="btn-save" type="button" style="flex: 1; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center;">Cambiar contraseña</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/sideBar.js"></script>
    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            if (!requireLogin()) return;
            await loadProfile();
        });

        async function loadProfile() {
            try {
                const result = await UsersAPI.getProfile();

                if (result.success && result.user) {
                    const user = result.user;
                    document.getElementById('userName').textContent  = user.full_name || 'Usuario';
                    document.getElementById('fullName').value        = user.full_name || '';
                    document.getElementById('email').value           = user.email     || '';
                    document.getElementById('phone').value           = user.phone     || 'No registrado';
                    document.getElementById('role').value            = user.role_name || 'Usuario';
                    document.getElementById('createdAt').value       = formatDate(user.created_at);
                } else {
                    showNotification('Error al cargar el perfil', 'error');
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                const user = getCurrentUser();
                if (user) {
                    document.getElementById('userName').textContent = user.full_name || 'Usuario';
                    document.getElementById('fullName').value       = user.full_name || '';
                    document.getElementById('email').value          = user.email     || '';
                }
            }
        }

        async function logout() {
            try {
                await AuthAPI.logout();
            } catch (e) {
                console.error('Logout API error:', e);
            } finally {
                clearUserSession();
                window.location.href = '../inicioSesion.html';
            }
        }
    </script>
</body>
</html>
