<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Reserva - Parking The Beasts</title>
    <link rel="stylesheet" href="../styles/updateReservation.css">
    <link rel="stylesheet" href="../styles/sideBar.css">
</head>

<body>
    <div id="menu-container"></div>
    <div class="main-content">
        <div class="update-reservation">
            <div class="update-header">
                <h2>Actualizar reserva</h2>
                <button class="close-btn" onclick="window.location.href='seeReservation.html'">X</button>
            </div>
            <form id="updateReservationForm">
                <label>Numero de reserva</label>
                <input type="text" id="reservationId" disabled>

                <label>Placa del vehiculo</label>
                <input type="text" id="vehiclePlate" required maxlength="10" style="text-transform:uppercase;">

                <label>Descripcion del vehiculo (opcional)</label>
                <input type="text" id="vehicleDescription" placeholder="Ej: Mazda 3 color rojo">

                <label>Fecha y hora de ingreso</label>
                <input type="datetime-local" id="startAt" required>

                <label>Fecha y hora de salida</label>
                <input type="datetime-local" id="endAt" required>

                <label>Tipo de vehiculo</label>
                <div class="vehicle-buttons" id="vehicleTypeButtons"></div>
                <input type="hidden" id="selectedVehicleType" required>

                <label>Notas adicionales (opcional)</label>
                <textarea id="notes" rows="2" placeholder="Alguna nota especial..."></textarea>

                <button type="submit" class="save-btn" id="submitBtn">Guardar Cambios</button>
            </form>
            <div id="errorMessage" class="error-message" style="display:none;color:red;margin-top:10px;"></div>
        </div>
    </div>

    <script src="../js/sideBar.js"></script>
    <script src="../js/api.js"></script>
    <script>
        let currentReservationId = null;
        let currentReservation   = null;

        document.addEventListener('DOMContentLoaded', async function() {
            if (!requireLogin()) return;

            const urlParams = new URLSearchParams(window.location.search);
            currentReservationId = urlParams.get('id');

            if (!currentReservationId) {
                showNotification('Reserva no especificada', 'error');
                window.location.href = 'seeReservation.html';
                return;
            }

            await loadVehicleTypes();
            await loadReservation(currentReservationId);
            setMinDateTime();
        });

        function setMinDateTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            const minDateTime = now.toISOString().slice(0, 16);
            document.getElementById('startAt').min = minDateTime;
            document.getElementById('endAt').min   = minDateTime;
        }

        async function loadVehicleTypes() {
            try {
                const result = await VehicleTypesAPI.getList();
                if (result.success && result.vehicle_types) {
                    const container = document.getElementById('vehicleTypeButtons');
                    container.innerHTML = '';
                    result.vehicle_types.forEach(type => {
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.textContent = type.name;
                        btn.dataset.id  = type.id;   // schema uses 'id'
                        btn.onclick = () => selectVehicleType(type.id, btn);
                        container.appendChild(btn);
                    });
                }
            } catch (error) {
                console.error('Error loading vehicle types:', error);
            }
        }

        async function loadReservation(id) {
            try {
                const result = await ReservationsAPI.getById(id);

                if (result.success && result.reservation) {
                    currentReservation = result.reservation;
                    const r = currentReservation;

                    // Schema PK is 'id'
                    document.getElementById('reservationId').value       = String(r.id).padStart(6, '0');
                    document.getElementById('vehiclePlate').value        = r.vehicle_plate;
                    document.getElementById('vehicleDescription').value  = r.vehicle_description || '';
                    document.getElementById('notes').value               = r.notes || '';
                    document.getElementById('startAt').value             = r.start_at.replace(' ', 'T').slice(0, 16);
                    document.getElementById('endAt').value               = r.end_at.replace(' ', 'T').slice(0, 16);
                    document.getElementById('selectedVehicleType').value = r.vehicle_type_id;

                    // Highlight selected vehicle type button
                    setTimeout(() => {
                        const btn = document.querySelector(`[data-id="${r.vehicle_type_id}"]`);
                        if (btn) {
                            btn.classList.add('active');
                            btn.style.backgroundColor = '#5c6bc0';
                            btn.style.color = 'white';
                        }
                    }, 100);

                    if (!['PENDING', 'CONFIRMED'].includes(r.status)) {
                        document.getElementById('submitBtn').disabled    = true;
                        document.getElementById('submitBtn').textContent = 'No se puede editar';
                        document.getElementById('submitBtn').style.backgroundColor = '#999';
                    }
                } else {
                    showNotification('No se pudo cargar la reserva', 'error');
                    window.location.href = 'seeReservation.html';
                }
            } catch (error) {
                console.error('Error loading reservation:', error);
                showNotification('Error al cargar la reserva', 'error');
            }
        }

        function selectVehicleType(id, button) {
            document.querySelectorAll('.vehicle-buttons button').forEach(btn => {
                btn.classList.remove('active');
                btn.style.backgroundColor = '';
                btn.style.color = '';
            });
            button.classList.add('active');
            button.style.backgroundColor = '#5c6bc0';
            button.style.color = 'white';
            document.getElementById('selectedVehicleType').value = id;
        }

        document.getElementById('updateReservationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const vehicleTypeId      = document.getElementById('selectedVehicleType').value;
            const vehiclePlate       = document.getElementById('vehiclePlate').value.toUpperCase();
            const vehicleDescription = document.getElementById('vehicleDescription').value;
            const startAt            = document.getElementById('startAt').value;
            const endAt              = document.getElementById('endAt').value;
            const notes              = document.getElementById('notes').value;
            const errorDiv           = document.getElementById('errorMessage');
            const submitBtn          = document.getElementById('submitBtn');

            if (!vehicleTypeId) {
                errorDiv.textContent = 'Por favor seleccione un tipo de vehiculo';
                errorDiv.style.display = 'block';
                return;
            }

            if (new Date(endAt) <= new Date(startAt)) {
                errorDiv.textContent = 'La fecha de salida debe ser posterior a la fecha de ingreso';
                errorDiv.style.display = 'block';
                return;
            }

            submitBtn.disabled    = true;
            submitBtn.textContent = 'Guardando...';
            errorDiv.style.display = 'none';

            try {
                // Send vehicle_type_id to match backend schema
                const result = await ReservationsAPI.update(currentReservationId, {
                    vehicle_type_id:     vehicleTypeId,
                    vehicle_plate:       vehiclePlate,
                    vehicle_description: vehicleDescription,
                    start_at:            startAt,
                    end_at:              endAt,
                    notes
                });

                if (result.success) {
                    showNotification('Reserva actualizada exitosamente!', 'success');
                    setTimeout(() => {
                        window.location.href = 'seeReservation.html';
                    }, 1500);
                } else {
                    errorDiv.textContent = result.message || 'Error al actualizar la reserva';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = error.message || 'Error de conexion. Intente nuevamente.';
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.disabled    = false;
                submitBtn.textContent = 'Guardar Cambios';
            }
        });
    </script>
</body>
</html>
