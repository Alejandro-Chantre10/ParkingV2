<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Datos - Parking The Beasts</title>
    <link rel="stylesheet" href="../styles/updatePersonalData.css">
    <link rel="stylesheet" href="../styles/sideBar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div id="menu-container"></div>
    <div class="main-content">
        <div class="profile-container">
            <div class="profile-container">
                <label for="file-input" class="profile-label">
                    <div class="profile-photo">
                        <span>Agregar<br>foto<br>de perfil</span>
                    </div>
                    <div class="edit-icon">
                        <i class="fas fa-pen"></i>
                    </div>
                </label>
                <input type="file" id="file-input" style="display:none" accept="image/*">
            </div>

            <div class="form-container">
                <form id="profileForm">
                    <!-- Fixed: schema has full_name, not first_name + last_name -->
                    <div class="form-group">
                        <label for="fullName">Nombre completo</label>
                        <input id="fullName" type="text" required placeholder="Tu nombre completo">
                    </div>

                    <div class="form-group">
                        <label for="email">Correo</label>
                        <input id="email" type="email" disabled style="background-color:#f5f5f5;">
                        <small style="color:#666;font-size:12px;">El correo no se puede modificar</small>
                    </div>

                    <div class="form-group">
                        <label for="phone">Telefono</label>
                        <input id="phone" type="tel" placeholder="Ej: 3001234567">
                    </div>

                    <div id="errorMessage"   style="display:none;color:red;margin:10px 0;text-align:center;"></div>
                    <div id="successMessage" style="display:none;color:green;margin:10px 0;text-align:center;"></div>

                    <button class="btn-save" type="submit" id="submitBtn">Guardar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/sideBar.js"></script>
    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            if (!requireLogin()) return;

            try {
                const result = await UsersAPI.getProfile();
                if (result.success && result.user) {
                    const user = result.user;
                    document.getElementById('fullName').value = user.full_name || '';
                    document.getElementById('email').value    = user.email    || '';
                    document.getElementById('phone').value    = user.phone    || '';
                }
            } catch (e) {
                // Fallback to session data
                const user = getCurrentUser();
                if (user) {
                    document.getElementById('fullName').value = user.full_name || '';
                    document.getElementById('email').value    = user.email     || '';
                }
            }
        });

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const fullName   = document.getElementById('fullName').value.trim();
            const phone      = document.getElementById('phone').value.trim();
            const errorDiv   = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const submitBtn  = document.getElementById('submitBtn');

            errorDiv.style.display   = 'none';
            successDiv.style.display = 'none';

            if (!fullName) {
                errorDiv.textContent = 'El nombre completo es requerido';
                errorDiv.style.display = 'block';
                return;
            }

            submitBtn.disabled    = true;
            submitBtn.textContent = 'Guardando...';

            try {
                const result = await UsersAPI.updateProfile({ full_name: fullName, phone });

                if (result.success) {
                    // Update local session
                    const currentUser = getCurrentUser();
                    if (currentUser) {
                        currentUser.full_name = fullName;
                        currentUser.phone     = phone;
                        localStorage.setItem('user', JSON.stringify(currentUser));
                    }
                    successDiv.textContent = 'Datos actualizados exitosamente!';
                    successDiv.style.display = 'block';
                } else {
                    errorDiv.textContent = result.message || 'Error al actualizar los datos';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = error.message || 'Error de conexion. Intente nuevamente.';
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.disabled    = false;
                submitBtn.textContent = 'Guardar';
            }
        });
    </script>
</body>
</html>
