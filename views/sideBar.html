<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<button id="show-sidebar-btn" class="floating-button hidden">&#9776;</button>

<nav class="sidebar">
    <div class="top-bar">
        <div class="menu-icon" id="toggle-menu">
            <i class="fas fa-bars"></i>
        </div>
        <!-- Boton Home -->
        <button class="home-btn" onclick="location.href='../index.html'">
            HOME <i class="fas fa-home"></i>
        </button>
    </div>

    <!-- Informacion del usuario -->
    <div class="user-info">
        <div class="top-bar">
            <div class="avatar" id="userAvatar">U</div>
            <span class="user-name" id="sidebarUserName">Usuario</span>
        </div>
    </div>

    <!-- Boton principal -->
    <button class="dropdown-btn" onclick="location.href='createReservation.html'">+ NUEVA RESERVA</button>

    <!-- Menu de navegacion -->
    <ul class="menu">
        <li><a href="seeReservation.html"><i class="fas fa-list"></i> Ver Reservas</a></li>
        <li><a href="userPayment.html"><i class="fas fa-credit-card"></i> Mis Pagos</a></li>
        <li><a href="rates.html"><i class="fas fa-dollar-sign"></i> Tarifas</a></li>

    </ul>
    
</nav>

<script>
    // Load user info in sidebar after DOM is loaded
    function loadSidebarUserInfo() {
        const userStr = localStorage.getItem('user');
        if (userStr) {
            try {
                const user = JSON.parse(userStr);
                const userName = document.getElementById('sidebarUserName');
                const avatar = document.getElementById('userAvatar');
                
                const fullName = (user.first_name && user.last_name) 
                    ? `${user.first_name} ${user.last_name}` 
                    : user.full_name || 'Usuario';
                
                if (userName) userName.textContent = fullName;
                if (avatar) avatar.textContent = fullName.charAt(0).toUpperCase();
            } catch (e) {
                console.error('Error parsing user data:', e);
            }
        }
    }

    // Call after a small delay to ensure sidebar is loaded
    setTimeout(loadSidebarUserInfo, 100);

    // Sidebar logout function
    function sidebarLogout() {
        // Clear all storage
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        sessionStorage.removeItem('user');
        sessionStorage.removeItem('token');
        
        // Redirect to login
        window.location.href = '../inicioSesion.html';
    }
</script>
