<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contrasena - Parking The Beasts</title>
    <link rel="stylesheet" href="../styles/updatePassword.css">
    <link rel="stylesheet" href="../styles/sideBar.css">
</head>

<body>
    <div id="menu-container"></div>
    <div class="main-content">
        <div class="profile-container">
            <div class="profile-image-wrapper">
                <img src="../images/ICONO USUARIO.png" alt="Imagen de perfil" class="profile-image">
            </div>
            <div class="profile-name" id="userName">Cargando...</div>
            <div class="profile-email" id="userEmail">Cargando...</div>

            <div class="form-container">
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="current-password">Contrasena actual</label>
                        <input id="current-password" type="password" required>
                        <img src="../images/ojos on.png" alt="Mostrar" class="eye-icon" onclick="togglePassword(this)">
                    </div>

                    <div class="form-group">
                        <label for="new-password">Contrasena nueva</label>
                        <input id="new-password" type="password" required minlength="6">
                        <img src="../images/ojos on.png" alt="Mostrar" class="eye-icon" onclick="togglePassword(this)">
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirmar contrasena</label>
                        <input id="confirm-password" type="password" required>
                        <img src="../images/ojos on.png" alt="Mostrar" class="eye-icon" onclick="togglePassword(this)">
                    </div>
                    
                    <div id="errorMessage" style="display: none; color: red; margin: 10px 0; text-align: center;"></div>
                    <div id="successMessage" style="display: none; color: green; margin: 10px 0; text-align: center;"></div>
                    
                    <button class="btn-save" type="submit" id="submitBtn">Guardar cambios</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/sideBar.js"></script>
    <script src="../js/api.js"></script>
    <script>
        // Load user data on page load
        document.addEventListener('DOMContentLoaded', function() {
            if (!requireLogin()) return;
            
            const user = getCurrentUser();
            if (user) {
                document.getElementById('userName').textContent = `${user.first_name} ${user.last_name}`;
                document.getElementById('userEmail').textContent = user.email;
            }
        });

        // Toggle password visibility
        function togglePassword(icon) {
            const input = icon.previousElementSibling;
            const isPassword = input.type === "password";

            input.type = isPassword ? "text" : "password";
            icon.src = isPassword ? "../images/ojo off.png" : "../images/ojos on.png";
            icon.alt = isPassword ? "Ocultar" : "Mostrar";
        }

        // Form submission
        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');
            
            // Reset messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Las contrasenas no coinciden';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Validate password length
            if (newPassword.length < 6) {
                errorDiv.textContent = 'La contrasena debe tener al menos 6 caracteres';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Guardando...';
            
            try {
                const result = await UsersAPI.updatePassword(currentPassword, newPassword);
                
                if (result.success) {
                    successDiv.textContent = 'Contrasena actualizada exitosamente!';
                    successDiv.style.display = 'block';
                    
                    // Clear form
                    document.getElementById('current-password').value = '';
                    document.getElementById('new-password').value = '';
                    document.getElementById('confirm-password').value = '';
                } else {
                    errorDiv.textContent = result.message || 'Error al actualizar la contrasena';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = error.message || 'Error de conexion. Intente nuevamente.';
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Guardar cambios';
            }
        });
    </script>
</body>
</html>
